<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ravie.in | Decentralizing Opportunities</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>

    <header class="top-nav">
        <div class="logo-container">
            <img src="assets/logo png.png" alt="Logo" class="master-logo">
        </div>

        <nav class="desktop-menu">
            <span onclick="window.location.href='index.html'">HOME</span>
            <span onclick="window.location.href='about.html'">ABOUT</span>
            <span onclick="window.location.href='socials.html'">SOCIALS</span>
        </nav>

        <div class="hamburger" id="hamburger-menu">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </header>

    <div class="mobile-dropdown" id="mobile-dropdown">
        <span onclick="window.location.href='index.html'">HOME</span>
        <span onclick="window.location.href='about.html'">ABOUT</span>
        <span onclick="window.location.href='socials.html'">SOCIALS</span>
    </div>
  
    <main id="app-container">
        <section id="gateway-view" class="view active-view">
            <div class="split-container">
                <div class="split-option" id="btn-creators">
                    <img src="assets/creator (web logo).png" alt="Creator Logo" class="split-icon outline-chevron">
                    <span class="split-text">TALENTS</span>
                </div>

                <div class="split-option" id="btn-brands">
                    <img src="assets/Brand (web logo).png" alt="Brand Logo" class="split-icon solid-chevron">
                    <span class="split-text">BRANDS</span>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
